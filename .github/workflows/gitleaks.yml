name: gitleaks

# 公式 gitleaks (https://github.com/gitleaks/gitleaks, MIT) の release バイナリを
# 直接 install して実行する Reusable Workflow。
# - 公式 README で推奨されている Docker image (ghcr.io/gitleaks/gitleaks) は
#   ubuntu-slim ランナーに Docker daemon が無いため使えないので、release tarball から install
# - v8.19.0 以降の deprecation に従い、サブコマンドは `git` / `dir` を使う
on:
  workflow_call:
    inputs:
      gitleaks-version:
        description: 'gitleaks のリリースタグ (例: latest, v8.30.1)。新しい secret パターンを取り込むため latest を既定'
        type: string
        default: latest
      config-path:
        description: 'リポ内の .gitleaks.toml 等のパス。空ならデフォルトルールを使用'
        type: string
        default: ''
      fail-on-leak:
        description: '検出時にジョブを失敗させるか (false なら exit-code=0)'
        type: boolean
        default: true
      fetch-depth:
        description: 'actions/checkout の fetch-depth。0 = 全履歴 (git モード時の推奨)'
        type: number
        default: 0
      scan-mode:
        description: 'gitleaks のサブコマンド (git = 履歴スキャン / dir = ディレクトリスキャン)'
        type: string
        default: git
      additional-args:
        description: 'gitleaks コマンドに追加で渡したい引数 (例: --log-opts="--all main..HEAD")'
        type: string
        default: ''

jobs:
  gitleaks:
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: Install gitleaks
        env:
          REQUESTED_VERSION: ${{ inputs.gitleaks-version }}
        run: |
          set -euo pipefail

          VERSION="${REQUESTED_VERSION}"
          if [ "${VERSION}" = "latest" ]; then
            VERSION=$(curl -fsSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest | jq -r '.tag_name')
            echo "Resolved latest = ${VERSION}"
          fi
          VERSION_NUM="${VERSION#v}"

          case "$(uname -m)" in
            x86_64) ARCH_TAG=x64 ;;
            aarch64) ARCH_TAG=arm64 ;;
            *) echo "unsupported arch: $(uname -m)"; exit 1 ;;
          esac

          TARBALL="gitleaks_${VERSION_NUM}_linux_${ARCH_TAG}.tar.gz"
          curl -fsSL -o "/tmp/${TARBALL}" \
            "https://github.com/gitleaks/gitleaks/releases/download/${VERSION}/${TARBALL}"
          tar -xzf "/tmp/${TARBALL}" -C /tmp gitleaks

          mkdir -p "$HOME/.local/bin"
          install -m 0755 /tmp/gitleaks "$HOME/.local/bin/gitleaks"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/gitleaks" version

      - name: Run gitleaks
        env:
          MODE: ${{ inputs.scan-mode }}
          CONFIG_PATH: ${{ inputs.config-path }}
          FAIL_ON_LEAK: ${{ inputs.fail-on-leak }}
          EXTRA_ARGS: ${{ inputs.additional-args }}
        run: |
          set -euo pipefail

          ARGS=("${MODE}" --redact --verbose --report-format sarif --report-path gitleaks.sarif)
          if [ -n "${CONFIG_PATH}" ]; then
            ARGS+=(--config "${CONFIG_PATH}")
          fi
          if [ "${FAIL_ON_LEAK}" = "false" ]; then
            ARGS+=(--exit-code 0)
          fi
          if [ -n "${EXTRA_ARGS}" ]; then
            # shellcheck disable=SC2206
            EXTRA=(${EXTRA_ARGS})
            ARGS+=("${EXTRA[@]}")
          fi

          echo "+ gitleaks ${ARGS[*]}"
          gitleaks "${ARGS[@]}"

      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore
          retention-days: 14
